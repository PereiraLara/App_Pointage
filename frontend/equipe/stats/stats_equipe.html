<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>stats</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/chart.min.js"></script>
    <link rel="stylesheet" href="../../assets/fonts/icofont/icofont.min.css">
    <script src="../../shared/menu.js"></script>
</head>
<body>
<div id="app" class="p-4 h-svh overflow-clip">
    <app-menu :user="connectedTravailleur"></app-menu>

    <div>
        <button class="bg-emerald-400 hover:bg-emerald-700 text-white font-medium rounded-lg py-2 px-4 mb-4"
                @click="goToProfil(id_equipe)">
            <i class="icofont-arrow-left"></i> Retour profil
        </button>

        <button class="bg-rose-400 hover:bg-rose-700 text-white font-medium rounded-lg py-2 px-4 mb-4 ml-4 absolute right-4"
                @click="goToDetailStats(id_equipe)">
            <i class="icofont-arrow-right"></i> Extra Stats
        </button>
    </div>

    <div class="bg-amber-50 rounded-xl p-4 flex justify-center items-center gap-2 mb-6">
        <span id="year-prev"
              class="icofont-simple-left text-lg sm:text-2xl cursor-pointer text-gray-500 hover:text-sky-500 transition-colors p-2 rounded-full hover:bg-white">
        </span>
        <input type="number" min="1900" :max="currentYear" step="1" v-model="annee" class="pl-4 text-lg sm:text-xl font-bold text-center bg-amber-50 text-gray-800 focus:outline-none"/>
        <span id="year-next"
              v-show="annee != currentYear"
              class="icofont-simple-right text-lg sm:text-2xl cursor-pointer text-gray-500 hover:text-sky-500 transition-colors p-2 rounded-full hover:bg-white">
        </span>
    </div>

    <div class="h-4/6 w-5/6 flex justify-self-center rounded-xl bg-white shadow-sm border border-gray-200 p-4">
        <canvas id="myChart" v-show="stats.length"></canvas>
        <p v-show="!stats.length" class="text-gray-400 text-center self-center w-full">
            Aucune statistique disponible pour {{ annee }}.
        </p>
    </div>

</div>
<script src="stats_equipe.js" type="module"></script>
<script src="../../shared/auth.js"></script>
</body>
</html>
